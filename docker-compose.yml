version: '3.8'

# Data stores — consumers read from Google Pub/Sub

services:
  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8100:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: consumer123
      CLICKHOUSE_DB: consumer

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/consumer123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  chromadb-data:
  clickhouse-data:
  neo4j-data:
  neo4j-logs:
