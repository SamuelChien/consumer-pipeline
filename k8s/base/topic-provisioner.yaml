apiVersion: batch/v1
kind: Job
metadata:
  name: topic-provisioner
  namespace: consumer-pipeline
  labels:
    app: consumer-pipeline
    component: topic-provisioner
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: provisioner
          image: gcr.io/blobfish-ai-429200/consumer-pipeline:latest
          command: ["node", "scripts/provision-topics.js"]
          env:
            - name: KAFKA_BROKERS
              value: "kafka-service.email-intelligence.svc.cluster.local:9092"
