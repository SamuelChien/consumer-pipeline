apiVersion: v1
kind: ConfigMap
metadata:
  name: consumer-pipeline-config
  namespace: consumer-pipeline
data:
  KAFKA_ENV: "gke"
  KAFKA_BROKERS: "kafka.kafka.svc.cluster.local:29092"
  KAFKA_SSL: "false"

  TOPIC_SESSIONS_RAW: "sessions.raw"
  TOPIC_SESSIONS_ANALYZED: "sessions.analyzed"
  TOPIC_SESSIONS_TOOLS: "sessions.tools"
  TOPIC_SESSIONS_FILES: "sessions.files"
  TOPIC_SKILLS_RAW: "skills.raw"
  TOPIC_SKILLS_ANALYZED: "skills.analyzed"
  TOPIC_SKILLS_ENTITIES: "skills.entities"
  TOPIC_SKILLS_DEPENDENCIES: "skills.dependencies"

  CHROMADB_URL: "http://chromadb-service.consumer-pipeline.svc.cluster.local:8000"
  CLICKHOUSE_URL: "http://clickhouse-service.consumer-pipeline.svc.cluster.local:8123"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_DB: "consumer"
  NEO4J_URI: "bolt://neo4j-service.consumer-pipeline.svc.cluster.local:7687"
  NEO4J_USER: "neo4j"

  CLAUDE_MODEL: "claude-sonnet-4-20250514"
  OUTPUT_DIR: "/data/output"

  PROJECT_ID: "blobfish-ai-429200"
  REGION: "us-central1"
  ZONE: "us-central1-a"
  CLUSTER_NAME: "email-intelligence-cluster"
