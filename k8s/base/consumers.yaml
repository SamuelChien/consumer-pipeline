---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipedia-consumer
  namespace: consumer-pipeline
  labels:
    app: consumer-pipeline
    consumer: wikipedia
spec:
  replicas: 1
  selector:
    matchLabels:
      consumer: wikipedia
  template:
    metadata:
      labels:
        app: consumer-pipeline
        consumer: wikipedia
    spec:
      containers:
        - name: wikipedia-consumer
          image: us-central1-docker.pkg.dev/blobfish-ai-429200/consumer-pipeline/consumer-pipeline:latest
          command: ["node", "src/consumers/wikipedia/index.js"]
          ports:
            - containerPort: 3003
              name: health
          envFrom:
            - configMapRef:
                name: consumer-pipeline-config
            - secretRef:
                name: consumer-pipeline-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: output
              mountPath: /data/output
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: consumer-output-pvc
