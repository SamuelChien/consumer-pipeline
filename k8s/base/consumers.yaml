---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikipedia-consumer
  namespace: consumer-pipeline
  labels:
    app: consumer-pipeline
    consumer: wikipedia
spec:
  replicas: 1
  selector:
    matchLabels:
      consumer: wikipedia
  template:
    metadata:
      labels:
        app: consumer-pipeline
        consumer: wikipedia
    spec:
      containers:
        - name: wikipedia-consumer
          image: consumer-pipeline:latest
          command: ["node", "src/consumers/wikipedia/index.js"]
          envFrom:
            - configMapRef:
                name: consumer-pipeline-config
            - secretRef:
                name: consumer-pipeline-secrets
          volumeMounts:
            - name: wiki-output
              mountPath: /data/output
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: wiki-output
          persistentVolumeClaim:
            claimName: consumer-output-pvc
