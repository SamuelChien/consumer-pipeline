---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb-consumer
  namespace: consumer-pipeline
  labels:
    app: consumer-pipeline
    consumer: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      consumer: chromadb
  template:
    metadata:
      labels:
        app: consumer-pipeline
        consumer: chromadb
    spec:
      containers:
        - name: chromadb-consumer
          image: us-central1-docker.pkg.dev/blobfish-ai-429200/consumer-pipeline/consumer-pipeline:latest
          command: ["node", "src/consumers/chromadb/index.js"]
          ports:
            - containerPort: 3001
              name: health
          envFrom:
            - configMapRef:
                name: consumer-pipeline-config
            - secretRef:
                name: consumer-pipeline-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
