---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb-consumer
  namespace: consumer-pipeline
  labels:
    app: consumer-pipeline
    consumer: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      consumer: chromadb
  template:
    metadata:
      labels:
        app: consumer-pipeline
        consumer: chromadb
    spec:
      containers:
        - name: chromadb-consumer
          image: consumer-pipeline:latest
          command: ["node", "src/consumers/chromadb/index.js"]
          envFrom:
            - configMapRef:
                name: consumer-pipeline-config
            - secretRef:
                name: consumer-pipeline-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
