apiVersion: batch/v1
kind: Job
metadata:
  name: data-loader
  namespace: consumer-pipeline
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: download-data
          image: google/cloud-sdk:slim
          command:
            - sh
            - -c
            - |
              gsutil cp gs://consumer-pipeline-data/skills.jsonl /data/skills.jsonl
              gsutil cp gs://consumer-pipeline-data/sessions.jsonl /data/sessions.jsonl
              ls -lh /data/
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
      containers:
        - name: loader
          image: us-central1-docker.pkg.dev/blobfish-ai-429200/consumer-pipeline/consumer-pipeline:latest
          command: ["node", "scripts/load-data.js"]
          env:
            - name: KAFKA_BROKERS
              value: "kafka.kafka.svc.cluster.local:29092"
            - name: KAFKAJS_NO_PARTITIONER_WARNING
              value: "1"
            - name: SKILLS_FILE
              value: "/data/skills.jsonl"
            - name: SESSIONS_FILE
              value: "/data/sessions.jsonl"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: data
          emptyDir: {}
